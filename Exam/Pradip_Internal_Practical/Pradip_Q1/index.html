<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Data</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Student Record</h1>
    <h4>Enter your Details</h4>

    <form id="form">
      <label for="name">Name :</label><br />
      <input type="text" id="name" /><br /><br />

      <label for="gender">Gender :</label><br />
      <input type="radio" name="gender" id="gender" value="Male" /> Male
      <input type="radio" name="gender" id="gender" value="Female" /> Female
      <br /><br />

      <label for="dob">DOB :</label><br />
      <input type="date" id="dob" /> <br /><br />

      <label for="add">Address :</label><br /><br />
      <textarea name="add" id="add" cols="20" rows="2"></textarea><br /><br />

      <button type="submit">Submit</button>
    </form>
    <br /><br /><br />
    <table id="table">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Gender</th>
        <th>DOB</th>
        <th>Address</th>
        <th>Age</th>
      </tr>
    </table>
  </body>
</html>
<script>
  document.getElementById("form").addEventListener("submit", function (e) {
    e.preventDefault();

    let id = 0;
    for (let i = 0; i < 10; i++) {
      id = parseInt(id + 1);
    }
    let name = document.getElementById("name").value;

    let gender = document.querySelector('input[name="gender"]:checked').value;

    let dob = document.getElementById("dob").value;
    let add = document.getElementById("add").value;

    let dobDate = new Date(dob);
    let today = new Date();

    let diff = today - dobDate;
    let age = Math.floor(diff / (1000 * 60 * 60 * 24 * 365));

    let table = document.getElementById("table");
    let row = table.insertRow();

    row.insertCell(0).innerHTML = id;
    row.insertCell(1).innerHTML = name;
    row.insertCell(2).innerHTML = gender;
    row.insertCell(3).innerHTML = dob;
    row.insertCell(4).innerHTML = add;
    row.insertCell(5).innerHTML = age;
  });
</script>
