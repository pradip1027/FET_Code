<!DOCTYPE html>
<html>

<head>
    <title>Employee Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-title">Employee Registration Form</div>
    <div class="form-container">
        <fieldset>
            <legend>Enter Details</legend>
            <form name="employeeForm" id="empForm">
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" name="empId" id="empId">
                </div>
                <div class="form-group">
                    <label>Employee Name</label>
                    <input type="text" name="empName" id="empName">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="password">
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" name="dob" id="dob">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <input type="radio" name="gender" value="Female"> Female
                        <input type="radio" name="gender" value="Male"> Male
                    </div>
                </div>
                <div class="form-group">
                    <label>Qualification</label>
                    <select name="qualification" id="qualification">
                        <option value="">--Select--</option>
                        <option value="B.E.">B.E.</option>
                        <option value="M.E.">M.E.</option>
                        <option value="PhD">PhD</option>
                        <option value="BCA">BCA</option>
                        <option value="MCA">MCA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="text" name="mobile" id="mobile">
                </div>
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" name="email" id="email">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea name="address" id="address" rows="5"></textarea>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-submit" onclick="submitForm()">Submit</button>
                    <button type="reset" class="btn-reset">Reset</button>
                </div>
            </form>
        </fieldset>
    </div>

    <div id="result-container" class="result-container" style="display:none;">
        <h3>Captured Data (Array):</h3>
        <p id="array-display"></p>
    </div>

    <script src="script.js"></script>
</body>

</html>
