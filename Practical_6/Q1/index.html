<!DOCTYPE html>
<html>
<head>
    <title>CRUD Q1</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</head>

<body>

<div class="container">

    <h2>Add Product Records in Table</h2>

    <input type="text" id="sid" placeholder="SID"><br>
    <input type="text" id="name" placeholder="Name"><br>
    <input type="text" id="branch" placeholder="Branch"><br>
    <input type="text" id="contact" placeholder="Contact"><br>

    <button id="add">Add Record</button>

    <table border="1" id="table">
        <tr>
            <th>SID</th>
            <th>Name</th>
            <th>Branch</th>
            <th>Contact</th>
        </tr>
    </table>

</div>

</body>
</html>
