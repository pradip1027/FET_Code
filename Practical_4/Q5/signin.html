<!DOCTYPE html>
<html>

<head>
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-container">
        <h2>Sign In</h2>
        <form id="signinForm">
            <input type="email" id="loginEmail" placeholder="Email Address (User ID)" required>
            <input type="password" id="loginContact" placeholder="Contact Number (Password)" required>
            <button type="submit">Sign In</button>
        </form>
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        <div id="error" class="error"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
