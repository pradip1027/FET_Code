<div class="page-container">
  <h1>Contact Us</h1>
  <div class="card" style="max-width: 600px;">
    <form>
      <div class="form-group" style="margin-bottom: 1rem;">
        <label style="display:block; margin-bottom: 0.5rem; font-weight: 500;">Name</label>
        <input type="text" style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 8px;">
      </div>
      <div class="form-group" style="margin-bottom: 1rem;">
        <label style="display:block; margin-bottom: 0.5rem; font-weight: 500;">Email</label>
        <input type="email" style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 8px;">
      </div>
      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label style="display:block; margin-bottom: 0.5rem; font-weight: 500;">Message</label>
        <textarea rows="5" style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 8px;"></textarea>
      </div>
      <button type="button" style="background: #4f46e5; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Send Message</button>
    </form>
  </div>
</div>

<style>
.page-container { max-width: 1200px; margin: 0 auto; }
h1 { font-size: 2.5rem; color: #111827; margin-bottom: 2rem; }
.card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
</style>
