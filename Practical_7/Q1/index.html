<!doctype html>
<html>
  <head>
    <title>Calculator Using Switch</title>
  </head>
  <body>
    <h2>Calculator Using Switch Case</h2>
    Enter First Number: <input type="number" id="num1" /><br /><br />
    Enter Second Number: <input type="number" id="num2" /><br /><br />
    Select Operation:
    <select id="choice">
      <option value="1">Addition</option>
      <option value="2">Subtraction</option>
      <option value="3">Multiplication</option>
      <option value="4">Division</option></select
    ><br /><br />
    <button onclick="calculate()">Calculate</button> <br /><br />
    Result: <input type="text" id="result" readonly />
    <script src="script.js"></script>
  </body>
</html>
